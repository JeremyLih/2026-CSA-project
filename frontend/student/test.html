<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test in Progress — Adaptive Test Engine</title>
  <link rel="stylesheet" href="style.css" />
  <script src="auth.js"></script>
  <script>
    (function () {
      const session = window.requireSession && window.requireSession();
      if (session && session.student) {
        window.__STUDENT__ = session.student;
      }
    })();
  </script>

  <style>
    body {
      background: var(--off-white);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .test-header {
      background: var(--navy);
      border-bottom: 2px solid var(--accent);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }

    .test-header .test-title {
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--white);
      font-size: 0.95rem;
    }
    .test-header .test-title span { color: var(--slate-light); font-weight: 400; }

    .timer-block {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--navy-light);
      padding: 7px 16px;
      border-radius: 99px;
      border: 1px solid var(--slate);
    }
    .timer-block .timer-icon { font-size: 0.85rem; }
    .timer-display {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 500;
      color: var(--white);
      letter-spacing: 1.5px;
      min-width: 55px;
      text-align: center;
    }
    .timer-display.warning { color: var(--accent); }
    .timer-display.danger  { color: #ff6b6b; animation: timerPulse 1s ease-in-out infinite; }

    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* Full width — no sidebar */
    .test-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      gap: 0;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
      gap: 24px;
    }

    /* QUESTION PANEL */
    .question-panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px;
      box-shadow: var(--shadow-sm);
      min-height: 420px;
      display: flex;
      flex-direction: column;
    }

    .question-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .question-counter {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .question-text {
      font-size: 1.1rem;
      color: var(--navy);
      line-height: 1.7;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .question-text pre {
      background: var(--navy);
      color: #a8ff78;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 16px 20px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin: 16px 0;
      border-left: 3px solid var(--accent);
    }

    .choices-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .choice-btn {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      color: var(--navy);
      font-family: var(--font-body);
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s var(--ease);
      line-height: 1.5;
    }
    .choice-btn:hover { border-color: var(--navy); background: var(--off-white); }
    .choice-btn.selected {
      border-color: var(--navy);
      background: #e8edf5;
      box-shadow: 0 0 0 2px rgba(13,27,42,0.15);
    }

    .choice-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--slate);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .choice-btn:hover    .choice-letter { border-color: var(--navy); color: var(--navy); }
    .choice-btn.selected .choice-letter { background: var(--navy); border-color: var(--navy); color: var(--white); }

    .question-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 0;
      margin-top: auto;
      border-top: 1px solid var(--border);
    }

    .nav-left, .nav-right { display: flex; gap: 10px; }

    .question-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      color: var(--slate);
      font-size: 0.9rem;
    }

    .modal h2 { margin-bottom: 8px; }
    .modal p  { color: var(--slate); margin-bottom: 20px; }
    .modal .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .unanswered-warning { color: var(--danger); font-weight: 600; font-size: 0.88rem; margin-bottom: 16px; }

    @media (max-width: 860px) {
      .test-body { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- TEST HEADER -->
<header class="test-header" role="banner">
  <div class="test-title">
    <span data-bind="test-name">Sorting Algorithms</span>
    &nbsp;·&nbsp;
    <span data-bind="student-name" style="color:var(--slate-light)">Jane Student</span>
  </div>

  <div class="timer-block" aria-live="polite" aria-label="Time remaining">
    <span class="timer-icon">⏱</span>
    <span class="timer-display" id="timer-display">30:00</span>
  </div>

  <div class="header-actions">
    <button class="btn btn-sm btn-outline"
            style="color:var(--slate-light);border-color:var(--slate)"
            data-action="pause-test"
            onclick="togglePause()">
      ⏸ Pause
    </button>
    <button class="btn btn-sm btn-danger"
            data-action="exit-test"
            onclick="confirmExit()">
      Exit Test
    </button>
  </div>
</header>

<!-- MAIN TEST BODY -->
<main class="test-body" role="main">

  <!-- Question Panel (full width) -->
  <div class="question-panel" id="question-panel" role="region" aria-label="Current question">

    <!-- Question metadata row -->
    <div class="question-meta">
      <span class="question-counter" id="question-counter">Question 1 of 15</span>
      <span class="badge badge-accent" id="difficulty-badge" aria-live="polite">Proficient</span>
    </div>

    <!-- Question text -->
    <div class="question-text" id="question-text" aria-live="polite">
      <div class="question-loading">
        <div class="spinner"></div>
        <span>Loading question...</span>
      </div>
    </div>

    <!-- Answer choices -->
    <ul class="choices-list" id="choices-list" role="radiogroup" aria-label="Answer choices">
    </ul>

    <!-- Navigation row -->
    <div class="question-nav">
      <div class="nav-left">
        <button class="btn btn-outline"
                id="prev-btn"
                data-action="prev-question"
                onclick="navigateQuestion(-1)"
                disabled>
          ← Previous
        </button>
      </div>
      <div class="nav-right">
        <button class="btn btn-primary"
                id="next-btn"
                data-action="next-question"
                onclick="commitAndAdvance()">
          Next →
        </button>
      </div>
    </div>

    <!-- Difficulty path dots -->
    <div id="difficulty-path-row"
         style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);
                display: flex; align-items: center; gap: 14px; flex-wrap: wrap;"
         aria-label="Difficulty path">
      <span style="font-size: 0.72rem; color: var(--slate); text-transform: uppercase;
                   letter-spacing: 0.6px; font-weight: 600;">Difficulty Path</span>
      <div id="difficulty-path-dots"
           style="display: flex; align-items: center; gap: 8px; min-height: 18px;"></div>
    </div>

  </div>

</main>

<!-- SUBMIT CONFIRMATION MODAL -->
<div class="modal-overlay" id="submit-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <h2 id="modal-title">Submit Your Test</h2>
    <p>Are you sure you want to submit? You cannot change your answers after submission.</p>
    <div id="unanswered-warning" class="unanswered-warning" style="display:none;"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSubmitModal()">Go Back</button>
      <button class="btn btn-accent btn-lg"
              data-action="confirm-submit"
              onclick="submitTest()">
        ✓ Submit Test
      </button>
    </div>
  </div>
</div>

<script>
  const QUESTION_TIME_LIMIT = 30;

  const testState = {
    testId:          sessionStorage.getItem('activeTestId') || 'TEST-001',
    studentId:       sessionStorage.getItem('studentId')    || 'STU-DEMO',
    sessionId:       sessionStorage.getItem('sessionId')    || null,
    currentQuestion: 0,
    totalQuestions:  15,
    timeRemaining:   QUESTION_TIME_LIMIT,
    isPaused:        false,
    timerInterval:   null,
    totalTimeSpent:  0,
    answerMap:       {},
    flagged:         new Set(),
    questions:       [],
    currentDifficulty: 1,
    difficultyPath:    [],
    previewChoice:     null,
  };

  const API_BASE = (() => {
    const host = window.location.hostname;
    const isLocal = host === 'localhost' || host === '127.0.0.1';
    return isLocal ? 'http://localhost:8080' : 'https://cs.andromedax.org';
  })();

  function makePendingQuestion(index) {
    return { questionId: `Q-PENDING-${index + 1}`, text: '', choices: [], correct: null };
  }

  function makeFallbackQuestion(index) {
    return {
      questionId: `Q-FALLBACK-${index + 1}`,
      text: 'Error loading question. Please try again.',
      choices: [
        { id: 'A', text: 'Retry' },
        { id: 'B', text: 'Retry' },
        { id: 'C', text: 'Retry' },
        { id: 'D', text: 'Retry' }
      ],
      correct: 'A'
    };
  }

  async function fetchQuestionInto(index, adaptation = {}) {
    const response = await fetch(`${API_BASE}/api/questions/next`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sessionId: testState.sessionId,
        difficulty: testState.currentDifficulty,
        ...adaptation
      })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    testState.questions[index] = {
      questionId: data.questionId || `Q-AI-${index + 1}`,
      text: data.text,
      choices: data.choices,
      correct: data.correctChoice
    };
  }

  window.addEventListener('DOMContentLoaded', async () => {
    testState.questions = Array.from(
      { length: testState.totalQuestions },
      (_, i) => makePendingQuestion(i)
    );

    updateDifficultyBadge();
    renderDifficultyPath();

    try {
      const startResp = await fetch(`${API_BASE}/api/sessions/start`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          studentId: testState.studentId,
          testId: testState.testId
        })
      });
      if (!startResp.ok) throw new Error(`HTTP ${startResp.status}`);
      const session = await startResp.json();
      testState.sessionId = session.sessionId;
      sessionStorage.setItem('sessionId', testState.sessionId);

      await fetchQuestionInto(0);
    } catch (err) {
      console.error('Failed to start test session:', err);
      testState.questions[0] = makeFallbackQuestion(0);
    }

    loadQuestion(0);
  });

  function startTimer() {
    clearInterval(testState.timerInterval);
    testState.timeRemaining = QUESTION_TIME_LIMIT;
    updateTimerDisplay();

    testState.timerInterval = setInterval(() => {
      if (testState.isPaused) return;
      testState.timeRemaining--;
      updateTimerDisplay();
      if (testState.timeRemaining <= 0) {
        clearInterval(testState.timerInterval);
        commitAndAdvance();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    const el = document.getElementById('timer-display');
    const t  = Math.max(0, testState.timeRemaining);
    el.textContent = `00:${String(t).padStart(2, '0')}`;
    el.classList.remove('warning', 'danger');
    if (t <= 5)       el.classList.add('danger');
    else if (t <= 10) el.classList.add('warning');
  }

  function togglePause() {
    testState.isPaused = !testState.isPaused;
    const btn = document.querySelector('[data-action="pause-test"]');
    btn.textContent = testState.isPaused ? '▶ Resume' : '⏸ Pause';
  }

  function loadQuestion(index) {
    testState.currentQuestion = index;
    testState.previewChoice   = null;
    const q = testState.questions[index];
    if (!q) return;

    document.getElementById('question-counter').textContent =
      `Question ${index + 1} of ${testState.totalQuestions}`;

    document.getElementById('question-text').innerHTML = q.text;
    renderChoices(q);

    document.getElementById('prev-btn').disabled = true;
    document.getElementById('next-btn').textContent =
      (index === testState.totalQuestions - 1) ? 'Finish' : 'Next';

    updateDifficultyBadge();
    startTimer();
  }

  function renderChoices(question) {
    const list = document.getElementById('choices-list');
    list.innerHTML = '';
    question.choices.forEach(choice => {
      const li = document.createElement('li');
      li.innerHTML = `
        <button
          class="choice-btn"
          data-choice="${choice.id}"
          data-question-id="${question.questionId}"
          onclick="selectAnswer('${question.questionId}', '${choice.id}', this)"
          role="radio"
          aria-checked="false"
          aria-label="Choice ${choice.id}: ${choice.text}"
        >
          <span class="choice-letter" aria-hidden="true">${choice.id}</span>
          <span class="choice-text">${choice.text}</span>
        </button>
      `;
      list.appendChild(li);
    });
  }

  function selectAnswer(questionId, choiceId, el) {
    document.querySelectorAll(`[data-question-id="${questionId}"]`).forEach(btn => {
      btn.classList.remove('selected');
      btn.setAttribute('aria-checked', 'false');
    });
    el.classList.add('selected');
    el.setAttribute('aria-checked', 'true');
    testState.previewChoice = choiceId;
  }

  async function commitAndAdvance() {
    clearInterval(testState.timerInterval);

    const idx    = testState.currentQuestion;
    const q      = testState.questions[idx];
    const choice = testState.previewChoice;
    const correct = choice !== null && choice === q.correct;

    testState.difficultyPath.push({ level: testState.currentDifficulty, correct });
    testState.answerMap[q.questionId] = choice || '__TIMEOUT__';
    sessionStorage.setItem('answerMap', JSON.stringify(testState.answerMap));
    testState.totalTimeSpent += (QUESTION_TIME_LIMIT - Math.max(0, testState.timeRemaining));

    testState.currentDifficulty = correct
      ? Math.min(5, testState.currentDifficulty + 1)
      : Math.max(1, testState.currentDifficulty - 1);

    renderDifficultyPath();

    const next = idx + 1;
    if (next >= testState.totalQuestions) {
      submitTest();
      return;
    }

    document.getElementById('question-text').innerHTML = `
      <div class="question-loading">
        <div class="spinner"></div>
        <span>Loading next question...</span>
      </div>`;
    document.getElementById('choices-list').innerHTML = '';
    document.getElementById('next-btn').disabled = true;

    try {
      await fetchQuestionInto(next, {
        previousQuestionId: q.questionId,
        selectedChoice: choice || null,
        wasCorrect: correct
      });
    } catch (err) {
      console.error('Next question fetch failed:', err);
      testState.questions[next] = makeFallbackQuestion(next);
    }

    document.getElementById('next-btn').disabled = false;
    loadQuestion(next);
  }

  function updateDifficultyBadge() {
    const badge = document.getElementById('difficulty-badge');
    if (!badge) return;
    const level = testState.currentDifficulty;
    const labels  = { 1: 'Emerging', 2: 'Developing', 3: 'Proficient', 4: 'Extending', 5: 'Beyond' };
    const classes = { 1: 'badge badge-slate', 2: 'badge badge-slate', 3: 'badge badge-accent', 4: 'badge badge-success', 5: 'badge badge-success' };
    badge.className   = classes[level];
    badge.textContent = labels[level];
  }

  function renderDifficultyPath() {
    const container = document.getElementById('difficulty-path-dots');
    if (!container) return;
    container.innerHTML = '';
    testState.difficultyPath.forEach((entry, i) => {
      const sizePx = entry.level === 1 ? 6 : entry.level === 2 ? 8 : entry.level === 3 ? 11 : entry.level === 4 ? 14 : 17;
      const color  = entry.correct ? 'var(--success)' : 'var(--danger)';
      const dot = document.createElement('span');
      dot.style.display      = 'inline-block';
      dot.style.width        = `${sizePx}px`;
      dot.style.height       = `${sizePx}px`;
      dot.style.borderRadius = '50%';
      dot.style.background   = color;
      dot.title = `Q${i + 1} — Level ${entry.level}, ${entry.correct ? 'correct' : 'wrong'}`;
      dot.setAttribute('aria-label', dot.title);
      container.appendChild(dot);
    });
  }

  function navigateQuestion(direction) {
    if (direction <= 0) return;
    commitAndAdvance();
  }

  function openSubmitModal() {
    const answered   = Object.keys(testState.answerMap).length;
    const unanswered = testState.totalQuestions - answered;
    const warning    = document.getElementById('unanswered-warning');
    if (unanswered > 0) {
      warning.textContent = `⚠ You have ${unanswered} unanswered question${unanswered > 1 ? 's' : ''}. These will be marked incorrect.`;
      warning.style.display = 'block';
    } else {
      warning.style.display = 'none';
    }
    document.getElementById('submit-modal').classList.add('open');
  }

  function closeSubmitModal() {
    document.getElementById('submit-modal').classList.remove('open');
  }

  function submitTest() {
    clearInterval(testState.timerInterval);
    closeSubmitModal();

    const reviewQuestions = testState.questions.map((q, i) => {
      const pathEntry = testState.difficultyPath[i];
      const raw = testState.answerMap[q.questionId];
      const isTimeout = raw === '__TIMEOUT__' || raw === undefined;
      const correct = !isTimeout && raw === q.correct;
      const studentChoice = !isTimeout ? q.choices.find(c => c.id === raw) : null;
      const correctChoice = q.choices.find(c => c.id === q.correct);
      return {
        id: q.questionId,
        number: i + 1,
        prompt: q.text,
        choices: q.choices,
        correctId: q.correct,
        correctAnswer: correctChoice ? `${q.correct} — ${correctChoice.text}` : q.correct,
        studentChoiceId: isTimeout ? null : raw,
        studentAnswer: isTimeout
          ? '(No answer submitted)'
          : studentChoice ? `${raw} — ${studentChoice.text}` : String(raw),
        status: isTimeout ? 'skipped' : correct ? 'correct' : 'incorrect',
        difficulty: pathEntry ? pathEntry.level : null,
        flagged: testState.flagged.has(i),
        aiPriority: !correct || isTimeout
      };
    });

    const correctCount = reviewQuestions.filter(q => q.status === 'correct').length;
    const testName = (document.querySelector('[data-bind="test-name"]')?.textContent || '').trim() || 'Test';

    const payload = {
      testId:    testState.testId,
      testName,
      studentId: testState.studentId,
      answerMap: testState.answerMap,
      timeTaken: testState.totalTimeSpent,
      difficultyPath:  testState.difficultyPath,
      finalDifficulty: testState.currentDifficulty,
      totalQuestions:  testState.totalQuestions,
      correctCount,
      score: Math.round((correctCount / Math.max(1, testState.totalQuestions)) * 100),
      flaggedIndices: Array.from(testState.flagged),
      questions: reviewQuestions
    };

    const historyId = 'HIST-' + Date.now();
    payload.historyId = historyId;

    const historyEntry = {
      testId: historyId,
      testTemplateId: testState.testId,
      testName,
      subject: testName,
      date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
      score: payload.score,
      correctCount,
      totalQuestions: testState.totalQuestions,
      finalDifficulty: testState.currentDifficulty,
      timeTaken: testState.totalTimeSpent,
      difficultyPath: testState.difficultyPath,
      answerMap: testState.answerMap,
      questionHistory: reviewQuestions
    };

    try {
      const historyRaw = sessionStorage.getItem('testHistory');
      const history = historyRaw ? JSON.parse(historyRaw) : [];
      history.push(historyEntry);
      sessionStorage.setItem('testHistory', JSON.stringify(history));
    } catch (err) {
      console.warn('[Submit] Could not append to testHistory:', err);
    }

    console.log('[Submit] Posting results:', payload);
    sessionStorage.setItem('lastResult', JSON.stringify(payload));
    window.location.href = 'results.html';
  }

  function confirmExit() {
    if (confirm('Are you sure you want to exit? Your progress will be lost.')) {
      clearInterval(testState.timerInterval);
      sessionStorage.removeItem('activeTestId');
      window.location.href = 'dashboard.html';
    }
  }

  document.getElementById('submit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeSubmitModal();
  });
</script>

<script src="integration.js"></script>

</body>
</html>
